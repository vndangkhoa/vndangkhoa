name: Update Latest Project

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest project
        id: project
        run: |
          JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/vndangkhoa/repos?sort=pushed&direction=desc&per_page=10")

          LATEST=$(echo "$JSON" | python3 -c "
import json, sys
repos = json.load(sys.stdin)
for r in repos:
    name = r['name']
    if name == 'vndangkhoa':
        continue
    desc = r.get('description') or 'No description'
    url = r['html_url']
    print(f'{name}|{desc}|{url}')
    break
")
          echo "data=$LATEST" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          IFS='|' read -r NAME DESC URL <<< "${{ steps.project.outputs.data }}"
          python3 -c "
import re
with open('README.md', 'r') as f:
    content = f.read()

start = '<!-- LATEST_REPO:START -->'
end = '<!-- LATEST_REPO:END -->'
replacement = f\"{start}\n🔭 Currently building <a href='$URL'><b>$NAME</b></a> — $DESC\n{end}\"

new_content = re.sub(
    re.escape(start) + '.*?' + re.escape(end),
    replacement,
    content,
    flags=re.DOTALL
)

with open('README.md', 'w') as f:
    f.write(new_content)
"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update latest project [skip ci]"
          git push
